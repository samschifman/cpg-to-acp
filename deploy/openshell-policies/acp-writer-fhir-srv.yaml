# acp-writer FHIR Server pod: HAPI FHIR server only
version: 1

filesystem_policy:
  read_only: [/usr, /lib, /lib64, /etc, /opt, /bin, /sbin]
  read_write: [/sandbox, /tmp, /app, /dev, /run, /var, /home]

network_policies:
  gateway:
    name: openshell-gateway
    endpoints:
      - host: "**.svc.cluster.local"
        port: 8080
        enforcement: log
        access: full
    binaries:
      - path: "**"
  fhir_server:
    name: hapi-fhir
    endpoints:
      - host: "**.svc.cluster.local"
        port: 8080
        enforcement: enforce
        access: full
    binaries:
      - path: "**"
