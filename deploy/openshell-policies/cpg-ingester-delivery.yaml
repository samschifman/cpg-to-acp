# cpg-ingester Delivery pod: acp-writer API only
version: 1

filesystem_policy:
  read_only: [/usr, /lib, /lib64, /etc, /opt, /bin, /sbin]
  read_write: [/sandbox, /tmp, /app, /dev, /run, /var, /home]

network_policies:
  gateway:
    name: openshell-gateway
    endpoints:
      - host: "**.svc.cluster.local"
        port: 8080
        enforcement: log
        access: full
    binaries:
      - path: "**"
  acp_writer:
    name: acp-writer-api
    endpoints:
      - host: "**.svc.cluster.local"
        port: 8082
        enforcement: enforce
        access: full
    binaries:
      - path: "**"
  minio:
    name: artifact-store
    endpoints:
      - host: "minio.sschifma-cpg-to-acp.svc.cluster.local"
        port: 9000
        enforcement: enforce
        access: full
    binaries:
      - path: "**"
