# UI pods (both cpg-ingester and acp-writer): cluster services + external ingress
version: 1

filesystem_policy:
  read_only: [/usr, /lib, /lib64, /etc, /opt, /bin, /sbin]
  read_write: [/sandbox, /tmp, /app, /dev, /run, /var, /home]

network_policies:
  gateway:
    name: openshell-gateway
    endpoints:
      - host: "**.svc.cluster.local"
        port: 8080
        enforcement: log
        access: full
    binaries:
      - path: "**"
  cluster_services:
    name: cluster-services
    endpoints:
      - host: "**.svc.cluster.local"
        port: 8082
        enforcement: log
        access: full
      - host: "**.svc.cluster.local"
        port: 8090
        enforcement: log
        access: full
    binaries:
      - path: "**"
