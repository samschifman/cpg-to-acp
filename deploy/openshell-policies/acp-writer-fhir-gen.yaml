# acp-writer FHIR Generation pod: terminology APIs only (HTTPS)
# NO access to patient data, LLM, or FHIR server
version: 1

filesystem_policy:
  read_only: [/usr, /lib, /lib64, /etc, /opt, /bin, /sbin]
  read_write: [/sandbox, /tmp, /app, /dev, /run, /var, /home]

network_policies:
  gateway:
    name: openshell-gateway
    endpoints:
      - host: "**.svc.cluster.local"
        port: 8080
        enforcement: log
        access: full
    binaries:
      - path: "**"
  terminology:
    name: terminology-apis
    endpoints:
      - host: tx.fhir.org
        port: 443
        enforcement: enforce
        access: full
      - host: browser.ihtsdotools.org
        port: 443
        enforcement: enforce
        access: full
      - host: rxnav.nlm.nih.gov
        port: 443
        enforcement: enforce
        access: full
      - host: clinicaltables.nlm.nih.gov
        port: 443
        enforcement: enforce
        access: full
    binaries:
      - path: "**"
  minio:
    name: artifact-store
    endpoints:
      - host: "minio.sschifma-cpg-to-acp.svc.cluster.local"
        port: 9000
        enforcement: enforce
        access: full
    binaries:
      - path: "**"
