# cpg-ingester LLM Analysis pod: LLM inference only (MaaS via HTTPS)
version: 1

filesystem_policy:
  read_only: [/usr, /lib, /lib64, /etc, /opt, /bin, /sbin]
  read_write: [/sandbox, /tmp, /app, /dev, /run, /var, /home]

network_policies:
  gateway:
    name: openshell-gateway
    endpoints:
      - host: "**.svc.cluster.local"
        port: 8080
        enforcement: log
        access: full
    binaries:
      - path: "**"
  llm_inference:
    name: llm-inference
    endpoints:
      - host: api.openai.com
        port: 443
        enforcement: enforce
        access: full
      - host: "**.svc.cluster.local"
        port: 443
        enforcement: enforce
        access: full
    binaries:
      - path: "**"
