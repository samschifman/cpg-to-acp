---
apiVersion: v1
kind: ConfigMap
metadata:
  name: acp-writer-api-gateway
  labels:
    app: acp-writer-api
data:
  nginx.conf: |
    worker_processes 1;
    error_log /var/log/nginx/error.log info;
    pid /tmp/nginx.pid;
    events { worker_connections 256; }
    http {
      access_log /var/log/nginx/access.log;
      include /etc/nginx/conf.d/*.conf;
    }
  default.conf: |
    client_max_body_size 50m;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 10s;

    server {
      listen 8080;

      # --- Patient Data pod ---
      location /api/v1/scan {
        proxy_pass http://acp-patient-data:8080;
      }

      # --- Decision Engine pod ---
      location /api/v1/decisions/ {
        proxy_pass http://acp-decision-engine:8080;
      }
      location /api/v1/execute {
        proxy_pass http://acp-decision-engine:8080;
      }

      # --- LLM Reasoning pod ---
      location /api/v1/guidelines {
        proxy_pass http://acp-llm-reasoning:8080;
      }
      location /api/v1/knowledge/ {
        proxy_pass http://acp-llm-reasoning:8080;
      }
      location /api/v1/resolve {
        proxy_pass http://acp-llm-reasoning:8080;
      }
      location /api/v1/retrieve {
        proxy_pass http://acp-llm-reasoning:8080;
      }
      location /api/v1/compose {
        proxy_pass http://acp-llm-reasoning:8080;
      }
      location /api/v1/review-fhir {
        proxy_pass http://acp-llm-reasoning:8080;
      }

      # --- FHIR Generation pod ---
      location /api/v1/generate-bundle {
        proxy_pass http://acp-fhir-generation:8080;
      }

      # --- FHIR Server pod ---
      location /api/v1/careplans {
        proxy_pass http://acp-fhir-server:8080;
      }
      location /api/v1/write {
        proxy_pass http://acp-fhir-server:8080;
      }

      # --- Gateway health ---
      location /health {
        return 200 '{"status":"UP","service":"acp-writer-api-gateway"}';
        add_header Content-Type application/json;
      }

      location / {
        return 404 '{"error":"not found"}';
        add_header Content-Type application/json;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: acp-writer-api
  labels:
    app: acp-writer-api
    component: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: acp-writer-api
  template:
    metadata:
      labels:
        app: acp-writer-api
        component: api-gateway
    spec:
      containers:
        - name: nginx
          image: registry.access.redhat.com/ubi9/nginx-124:latest
          command: ["nginx", "-g", "daemon off;", "-c", "/etc/nginx/nginx-custom.conf"]
          ports:
            - containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx-custom.conf
              subPath: nginx.conf
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/api-gateway.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: nginx-config
          configMap:
            name: acp-writer-api-gateway
---
apiVersion: v1
kind: Service
metadata:
  name: acp-writer-api
  labels:
    app: acp-writer-api
spec:
  selector:
    app: acp-writer-api
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
