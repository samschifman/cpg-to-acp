apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-litellm
  labels:
    app.kubernetes.io/name: litellm
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: cpg-to-acp
type: Opaque
stringData:
  VERTEX_PROJECT: {{ .Values.vertexAi.project | quote }}
  VERTEX_LOCATION: {{ .Values.vertexAi.location | quote }}
  LITELLM_MASTER_KEY: {{ .Values.litellm.masterKey | quote }}
