# Ingestion pod: MinIO artifact store only (filesystem + ML, no LLM)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-ingestion-policy
spec:
  podSelector:
    matchLabels:
      security-profile: ingestion
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: minio
      ports:
        - port: 9000
          protocol: TCP
    - to:
        - podSelector: {}
      ports:
        - port: 8080
          protocol: TCP

# LLM Analysis pod: LLM inference (MaaS gateway) + MinIO artifact store
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-llm-analysis-policy
spec:
  podSelector:
    matchLabels:
      security-profile: llm-analysis
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
    - to: []
      ports:
        - port: 443
          protocol: TCP
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-ingress
      ports:
        - port: 80
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: minio
      ports:
        - port: 9000
          protocol: TCP
    - to:
        - podSelector: {}
      ports:
        - port: 8080
          protocol: TCP

