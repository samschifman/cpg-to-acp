# UI pod: orchestrator access only
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-ui-policy
spec:
  podSelector:
    matchLabels:
      security-profile: ui
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: openshift-dns
      ports:
        - port: 5353
          protocol: UDP
        - port: 5353
          protocol: TCP
    - to: []
      ports:
        - port: 443
          protocol: TCP
    - to:
        - podSelector: {}
      ports:
        - port: 8080
          protocol: TCP
