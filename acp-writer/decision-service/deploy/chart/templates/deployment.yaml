apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-decision-service
  labels:
    app.kubernetes.io/name: decision-service
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: decision-engine
    app.kubernetes.io/part-of: cpg-to-acp
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: decision-service
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: decision-service
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: decision-engine
        app.kubernetes.io/part-of: cpg-to-acp
    spec:
      containers:
        - name: decision-service
          image: "{{ .Values.image.registry }}/{{ .Values.image.namespace }}/{{ .Values.image.name }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: {{ .Values.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
