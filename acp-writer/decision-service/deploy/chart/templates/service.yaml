apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-decision-service
  labels:
    app.kubernetes.io/name: decision-service
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/part-of: cpg-to-acp
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: decision-service
    app.kubernetes.io/instance: {{ .Release.Name }}
