openapi: 3.1.0
info:
  title: ACP Writer API
  description: |
    Composes patient-specific, FHIR-compliant care plans by combining clinical
    decision logic (DMN) with patient data. Manages an internal decision engine
    (Drools/Kogito) and knowledge base (vector store).

    Callers provide patient data directly — the acp-writer does not query FHIR
    servers. The decision engine and vector store are internal implementation
    details hidden behind this API.

    Contract version: 1.0
  version: 0.2.0
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: http://localhost:8082
    description: Local development

paths:

  # --- Guidelines ---

  /api/v1/guidelines:
    post:
      operationId: registerGuideline
      summary: Register a clinical practice guideline
      description: |
        Registers guideline-level metadata. Both decision models and
        recommendations reference this by cpg_id.
      tags: [guidelines]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CPGMetadata"
      responses:
        "201":
          description: Guideline registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPGMetadata"
        "400":
          description: Invalid metadata

    get:
      operationId: listGuidelines
      summary: List registered guidelines
      tags: [guidelines]
      responses:
        "200":
          description: List of guidelines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CPGMetadata"

  /api/v1/guidelines/{cpgId}:
    parameters:
      - name: cpgId
        in: path
        required: true
        schema:
          type: string

    get:
      operationId: getGuideline
      summary: Retrieve a registered guideline
      tags: [guidelines]
      responses:
        "200":
          description: Guideline details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CPGMetadata"
        "404":
          description: Guideline not found

    delete:
      operationId: removeGuideline
      summary: Remove a guideline and all associated artifacts
      description: |
        Cascade-deletes all decision models and recommendations associated
        with this guideline.
      tags: [guidelines]
      responses:
        "204":
          description: Guideline and associated artifacts removed
        "404":
          description: Guideline not found

  # --- Decision Models ---

  /api/v1/decisions/models:
    post:
      operationId: deployDecisionModel
      summary: Deploy a DMN decision model
      description: |
        Accepts a DMN 1.4 XML document and deploys it to the internal decision
        engine. The model becomes available for care plan generation and
        direct evaluation.
      tags: [decisions]
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: string
              description: DMN 1.4 XML document
      responses:
        "201":
          description: Model deployed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionModelSummary"
        "400":
          description: Invalid DMN XML
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

    get:
      operationId: listDecisionModels
      summary: List deployed decision models
      tags: [decisions]
      responses:
        "200":
          description: List of deployed models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DecisionModelSummary"

  /api/v1/decisions/models/{modelId}:
    parameters:
      - name: modelId
        in: path
        required: true
        schema:
          type: string

    get:
      operationId: getDecisionModel
      summary: Get a deployed decision model
      tags: [decisions]
      responses:
        "200":
          description: Model details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionModelDetail"
        "404":
          description: Model not found

    delete:
      operationId: removeDecisionModel
      summary: Remove a deployed decision model
      tags: [decisions]
      responses:
        "204":
          description: Model removed
        "404":
          description: Model not found

  /api/v1/decisions/evaluate/{modelId}:
    post:
      operationId: evaluateDecision
      summary: Evaluate a decision model with test inputs
      description: |
        Invokes a deployed DMN model with the provided inputs and returns the
        decision output. Useful for validating extracted DMN before committing.
      tags: [decisions]
      parameters:
        - name: modelId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: DMN input values keyed by input data name
              example:
                Systolic BP: 142
                Has Diabetes: true
                Has Kidney Disease: false
      responses:
        "200":
          description: Decision output
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Model not found
        "400":
          description: Invalid input data

  # --- Knowledge Base (Recommendations) ---

  /api/v1/knowledge/recommendations:
    post:
      operationId: ingestRecommendation
      summary: Ingest a single recommendation
      tags: [knowledge]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Recommendation"
      responses:
        "201":
          description: Recommendation ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationSummary"
        "400":
          description: Invalid recommendation

    get:
      operationId: listRecommendations
      summary: List ingested recommendations
      tags: [knowledge]
      parameters:
        - name: source_cpg
          in: query
          schema:
            type: string
          description: Filter by source CPG identifier
      responses:
        "200":
          description: List of recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecommendationSummary"

  /api/v1/knowledge/recommendations/batch:
    post:
      operationId: ingestRecommendationBatch
      summary: Ingest a batch of recommendations
      tags: [knowledge]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationBundle"
      responses:
        "201":
          description: Recommendations ingested
          content:
            application/json:
              schema:
                type: object
                properties:
                  ingested:
                    type: integer
                  source_cpg:
                    type: string
        "400":
          description: Invalid bundle

  /api/v1/knowledge/recommendations/{recommendationId}:
    parameters:
      - name: recommendationId
        in: path
        required: true
        schema:
          type: string

    get:
      operationId: getRecommendation
      summary: Retrieve a recommendation by ID
      tags: [knowledge]
      responses:
        "200":
          description: Full recommendation with all metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recommendation"
        "404":
          description: Recommendation not found

  /api/v1/knowledge/search:
    post:
      operationId: searchRecommendations
      summary: Semantic search over recommendations
      tags: [knowledge]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommendationSearchRequest"
      responses:
        "200":
          description: Search results (summaries, not full objects)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationSearchResponse"

  # --- Care Plans ---

  /api/v1/careplans:
    post:
      operationId: generateCarePlan
      summary: Generate a care plan from patient data
      description: |
        Accepts patient data as a FHIR Bundle or IPS document. Internally
        extracts relevant clinical data, invokes applicable DMN decision
        models, retrieves relevant recommendations from the knowledge base,
        and assembles a FHIR CarePlan Bundle.

        The caller is responsible for providing patient data — this service
        does not query FHIR servers directly.
      tags: [careplans]
      requestBody:
        required: true
        content:
          application/fhir+json:
            schema:
              type: object
              description: FHIR Bundle or IPS document containing patient data
      responses:
        "201":
          description: Care plan generated
          content:
            application/fhir+json:
              schema:
                type: object
                description: FHIR Bundle containing CarePlan, Goal, and activity resources
        "400":
          description: Invalid patient data
        "422":
          description: Unable to generate care plan (e.g., no applicable decision models)

    get:
      operationId: listCarePlans
      summary: List generated care plans
      tags: [careplans]
      parameters:
        - name: patient
          in: query
          schema:
            type: string
          description: Filter by patient reference
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, approved, rejected]
          description: Filter by care plan status
      responses:
        "200":
          description: List of care plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CarePlanSummary"

  /api/v1/careplans/{careplanId}:
    parameters:
      - name: careplanId
        in: path
        required: true
        schema:
          type: string

    get:
      operationId: getCarePlan
      summary: Retrieve a generated care plan
      tags: [careplans]
      responses:
        "200":
          description: Care plan bundle
          content:
            application/fhir+json:
              schema:
                type: object
                description: FHIR Bundle containing CarePlan and related resources
        "404":
          description: Care plan not found

  /api/v1/careplans/{careplanId}/status:
    put:
      operationId: updateCarePlanStatus
      summary: Update care plan status
      tags: [careplans]
      parameters:
        - name: careplanId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CarePlanStatusUpdate"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CarePlanSummary"
        "404":
          description: Care plan not found

  # --- Health ---

  /health:
    get:
      operationId: healthCheck
      summary: Liveness check
      tags: [health]
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: UP

  /health/ready:
    get:
      operationId: readinessCheck
      summary: Readiness check
      tags: [health]
      responses:
        "200":
          description: Service is ready
        "503":
          description: Service is not ready

  /api/v1/status:
    get:
      operationId: getStatus
      summary: Detailed component status
      tags: [health]
      responses:
        "200":
          description: Component status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceStatus"

components:
  schemas:

    # --- Guidelines ---

    CPGMetadata:
      type: object
      required: [cpg_id, title]
      properties:
        contract_version:
          type: string
          default: "1.0"
        cpg_id:
          type: string
        title:
          type: string
        version:
          type: string
        publication_date:
          type: string
          format: date
        evidence_review_date:
          type: string
          format: date
        issuing_body:
          type: string
        grading_system:
          type: string
          enum: [GRADE, COR-LOE, GRADE-COR-hybrid, simplified, verb-implied, ungraded]
        scope:
          type: string
        supersedes:
          type: array
          items:
            type: string

    # --- Decision Models ---

    DecisionModelSummary:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        inputs:
          type: array
          items:
            $ref: "#/components/schemas/DecisionVariable"
        outputs:
          type: array
          items:
            $ref: "#/components/schemas/DecisionVariable"
        deployed_at:
          type: string
          format: date-time
        source_cpg:
          type: string
        category:
          type: string
          enum: [treatment, screening, monitoring, risk-assessment, diagnostic]
        modifies:
          type: array
          items:
            type: string
        source_location:
          $ref: "#/components/schemas/SourceLocation"

    DecisionModelDetail:
      allOf:
        - $ref: "#/components/schemas/DecisionModelSummary"
        - type: object
          properties:
            dmn_xml:
              type: string

    DecisionVariable:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [string, number, boolean]
        description:
          type: string
        codes:
          type: array
          items:
            type: string

    # --- Knowledge (Recommendations) ---

    Recommendation:
      type: object
      required: [id, source_cpg, title, content, recommendation_type]
      properties:
        id:
          type: string
          description: Globally unique (GUID)
        source_cpg:
          type: string
        section:
          type: string
        title:
          type: string
        content:
          type: string
          description: Recommendation text (plain text or markdown)
        recommendation_type:
          type: string
          enum: [treatment, diagnostic, monitoring, lifestyle, educational, referral, screening, contraindication, process]
        certainty:
          $ref: "#/components/schemas/CertaintyGrade"
        scope_notes:
          type: string
        remarks:
          type: array
          items:
            type: string
        rationale:
          type: string
        cross_references:
          type: array
          items:
            $ref: "#/components/schemas/CrossReference"
        provenance:
          type: string
          enum: [reviewed, new-added, amended, not-changed, removed]
        evidence_review_date:
          type: string
          format: date
        source_location:
          $ref: "#/components/schemas/SourceLocation"

    RecommendationSummary:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        source_cpg:
          type: string
        recommendation_type:
          type: string
          enum: [treatment, diagnostic, monitoring, lifestyle, educational, referral, screening, contraindication, process]
        certainty:
          $ref: "#/components/schemas/CertaintyGrade"

    RecommendationBundle:
      type: object
      required: [source_cpg, recommendations]
      properties:
        contract_version:
          type: string
          default: "1.0"
        source_cpg:
          type: string
        recommendations:
          type: array
          items:
            $ref: "#/components/schemas/Recommendation"

    CertaintyGrade:
      type: object
      required: [strength, evidence_quality]
      properties:
        strength:
          type: string
          enum: [strong-for, conditional-for, consensus, no-recommendation, conditional-against, strong-against]
        evidence_quality:
          type: string
          enum: [high, moderate, low, very-low, ungraded]
        grading_system:
          type: string
          enum: [GRADE, COR-LOE, GRADE-COR-hybrid, simplified, verb-implied, ungraded]
        original_grade:
          type: string

    SourceLocation:
      type: object
      required: [page_start]
      description: Where in the source CPG document this item was extracted from
      properties:
        page_start:
          type: integer
          description: 1-indexed page number
        page_end:
          type: integer
          description: End page for multi-page spans
        bbox:
          type: array
          items:
            type: number
          minItems: 4
          maxItems: 4
          description: "Bounding box [left, top, right, bottom] from Docling"
        source_text:
          type: string
          description: Brief verbatim excerpt from the source document

    CrossReference:
      type: object
      required: [target_id, relationship]
      properties:
        target_id:
          type: string
          description: GUID of the referenced recommendation or decision model
        relationship:
          type: string
          enum: [prerequisite, alternative, conflicts-with, modifies, related, supersedes, other]
        description:
          type: string

    # --- Search ---

    RecommendationSearchRequest:
      type: object
      required: [query]
      properties:
        query:
          type: string
        top_k:
          type: integer
          default: 5
        source_cpg:
          type: string
        recommendation_type:
          type: string
          enum: [treatment, diagnostic, monitoring, lifestyle, educational, referral, screening, contraindication, process]
        strength_in:
          type: array
          items:
            type: string
            enum: [strong-for, conditional-for, consensus, no-recommendation, conditional-against, strong-against]

    RecommendationSearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/RecommendationSearchResult"

    RecommendationSearchResult:
      type: object
      properties:
        recommendation:
          $ref: "#/components/schemas/RecommendationSummary"
        score:
          type: number
        excerpt:
          type: string

    # --- Care Plans ---

    CarePlanSummary:
      type: object
      properties:
        id:
          type: string
        patient_reference:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [draft, approved, rejected]
        generated_at:
          type: string
          format: date-time
        decision_models_used:
          type: array
          items:
            type: string

    CarePlanStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, rejected]
        reason:
          type: string

    # --- Health ---

    ServiceStatus:
      type: object
      properties:
        version:
          type: string
        decision_engine:
          type: object
          properties:
            status:
              type: string
              enum: [healthy, degraded, unavailable]
            models_deployed:
              type: integer
        knowledge_base:
          type: object
          properties:
            status:
              type: string
              enum: [healthy, degraded, unavailable]
            recommendations_ingested:
              type: integer

    Error:
      type: object
      properties:
        error:
          type: string
        detail:
          type: string
