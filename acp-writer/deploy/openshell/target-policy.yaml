# Target OpenShell sandbox policy for acp-writer
#
# This file documents the intended OpenShell network policies for when
# full OpenShell integration is implemented. Currently, OpenShift
# NetworkPolicies (see ../chart/templates/networkpolicy.yaml) provide
# a partial substitute at the Kubernetes level.
#
# OpenShell adds per-binary, L7-level enforcement that NetworkPolicies
# cannot match — e.g. allowing the Python process to reach the decision
# service but blocking a subprocess spawned by prompt injection.

# acp-writer sandbox policy
sandbox:
  name: acp-writer

  network:
    # acp-writer should ONLY reach these services:
    allow:
      - host: cpg-decision-svc-decision-service
        port: 8081
        description: "Kogito JIT DMN evaluation"

      - host: cpg-mock-ehr-hapi-fhir
        port: 8080
        description: "FHIR patient data queries"

      - host: "*.apps.rosa.agentic-mcp.jolf.p3.openshiftapps.com"
        port: 443
        description: "MaaS gateway for LLM inference"

      - host: mlflow-redhat-ods-applications.apps.rosa.agentic-mcp.jolf.p3.openshiftapps.com
        port: 443
        description: "MLflow tracing"

    # acp-writer should NOT reach:
    deny:
      - description: "Public internet — no data exfiltration"
      - description: "Other namespaces — blast radius containment"
      - description: "Automation service — acp-writer publishes BPMN, does not execute it"

  filesystem:
    writable:
      - /tmp
      - /app
    readonly:
      - /

  process:
    deny_privilege_escalation: true
