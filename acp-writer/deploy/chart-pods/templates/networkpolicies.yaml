# Patient Data pod: no external network (patient data only, no LLM, no FHIR server)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-patient-data-policy
spec:
  podSelector:
    matchLabels:
      security-profile: patient-data
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

# LLM Reasoning pod: LLM inference (HTTPS 443) only
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-llm-reasoning-policy
spec:
  podSelector:
    matchLabels:
      security-profile: llm-reasoning
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to: []
      ports:
        - port: 443
          protocol: TCP

# Decision Engine pod: Kogito runtime only
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-decision-engine-policy
spec:
  podSelector:
    matchLabels:
      security-profile: decision-engine
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: decision-service
      ports:
        - port: 8081
          protocol: TCP

