# UI pod: ingress open, egress to cluster services
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-ui-policy
spec:
  podSelector:
    matchLabels:
      security-profile: ui
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}
  egress:
    - to:
        - podSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - to: []
      ports:
        - port: 443
          protocol: TCP
