apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-acp-writer
  labels:
    app.kubernetes.io/name: acp-writer
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: care-plan-writer
    app.kubernetes.io/part-of: cpg-to-acp
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: acp-writer
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: acp-writer
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: care-plan-writer
        app.kubernetes.io/part-of: cpg-to-acp
    spec:
      containers:
        - name: acp-writer
          image: "{{ .Values.image.registry }}/{{ .Values.image.namespace }}/{{ .Values.image.name }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: KOGITO_URL
              value: {{ .Values.decisionService.url | quote }}
            - name: MLFLOW_TRACKING_URI
              value: {{ .Values.mlflow.trackingUri | quote }}
          readinessProbe:
            httpGet:
              path: /health/ready
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
