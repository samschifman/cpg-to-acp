services:

  hapi-fhir:
    image: hapiproject/hapi:latest
    ports:
      - "8080:8080"
    environment:
      - hapi.fhir.fhir_version=R4
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/fhir/metadata"]
      interval: 10s
      timeout: 10s
      start_period: 30s
      retries: 12

  fhir-loader:
    build:
      context: ./mock-EHR
      dockerfile: deploy/Dockerfile.loader
    environment:
      - FHIR_BASE_URL=http://hapi-fhir:8080/fhir
    depends_on:
      hapi-fhir:
        condition: service_healthy

  kogito:
    build:
      context: ./acp-writer/decision-service
      dockerfile: deploy/Dockerfile
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/q/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 20

  litellm:
    build:
      context: ./platform/litellm
      dockerfile: deploy/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - ./platform/litellm/deploy/.env

  acp-writer:
    build:
      context: .
      dockerfile: acp-writer/deploy/Dockerfile
    ports:
      - "8082:8082"
    depends_on:
      kogito:
        condition: service_healthy
    environment:
      - KOGITO_URL=http://kogito:8081
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/health"]
      interval: 5s
      timeout: 5s
      retries: 10
