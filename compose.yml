services:

  hapi-fhir:
    image: hapiproject/hapi:latest
    ports:
      - "8080:8080"
    environment:
      - hapi.fhir.fhir_version=R4
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/fhir/metadata"]
      interval: 10s
      timeout: 10s
      start_period: 30s
      retries: 12

  fhir-loader:
    build:
      context: ./mock-EHR
      dockerfile: deploy/Dockerfile.loader
    environment:
      - FHIR_BASE_URL=http://hapi-fhir:8080/fhir
    depends_on:
      hapi-fhir:
        condition: service_healthy

  kogito:
    build:
      context: ./acp-writer/decision-service
      dockerfile: deploy/Dockerfile
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/q/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 20

  litellm:
    build:
      context: ./platform/litellm
      dockerfile: deploy/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - ./platform/litellm/deploy/.env

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.21.3
    ports:
      - "5000:5000"
    command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "5000"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  acp-writer:
    build:
      context: .
      dockerfile: acp-writer/deploy/Dockerfile
    ports:
      - "8082:8082"
    depends_on:
      kogito:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      - KOGITO_URL=http://kogito:8081
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  cpg-ingester:
    build:
      context: .
      dockerfile: cpg-ingester/deploy/Dockerfile
    depends_on:
      acp-writer:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    environment:
      - ACP_WRITER_URL=http://acp-writer:8082
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    profiles:
      - ingester

  # --- cpg-ingester pod-split services ---

  cpg-ingester-ingestion:
    build:
      context: .
      dockerfile: cpg-ingester/deploy/pods/Dockerfile.ingestion
    ports:
      - "8090:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles:
      - ingester-pods

  cpg-ingester-llm:
    build:
      context: .
      dockerfile: cpg-ingester/deploy/pods/Dockerfile.llm-analysis
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      - LITELLM_URL=http://litellm:4000
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles:
      - ingester-pods

  cpg-ingester-assembly:
    build:
      context: .
      dockerfile: cpg-ingester/deploy/pods/Dockerfile.assembly
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles:
      - ingester-pods

  cpg-ingester-delivery:
    build:
      context: .
      dockerfile: cpg-ingester/deploy/pods/Dockerfile.delivery
    depends_on:
      acp-writer:
        condition: service_healthy
    environment:
      - ACP_WRITER_URL=http://acp-writer:8082
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles:
      - ingester-pods

  cpg-ingester-ui:
    build:
      context: .
      dockerfile: cpg-ingester/deploy/pods/Dockerfile.ui
    ports:
      - "8095:8090"
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    profiles:
      - ingester-pods
